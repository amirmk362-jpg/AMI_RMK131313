    <script>
      /* اسلایدر بنر */
      var bi = 0,
        bSlides = document.querySelectorAll(".b-slide"),
        bDots = document.querySelectorAll(".b-dot");
      function goBanner(n) {
        bi = n;
        bSlides.forEach(function (s, i) {
          s.classList.toggle("active", i === n);
        });
        bDots.forEach(function (d, i) {
          d.classList.toggle("active", i === n);
        });
        clearInterval(bT);
        bT = setInterval(function () {
          goBanner((bi + 1) % bSlides.length);
        }, 4500);
      }
      var bT = setInterval(function () {
        goBanner((bi + 1) % bSlides.length);
      }, 4500);

      /* محصولات پرتخفیف */
      var discountIds = Object.keys(PRODUCTS_DB)
        .sort(function (a, b) {
          return PRODUCTS_DB[b].disc - PRODUCTS_DB[a].disc;
        })
        .slice(0, 10);
      document.getElementById("discount-list").innerHTML = discountIds
        .map(function (id) {
          return renderProductCard(PRODUCTS_DB[id], id, "p-card");
        })
        .join("");
      enableDragScroll(document.getElementById("discount-scroll"));
      observeCards();
    </script>
